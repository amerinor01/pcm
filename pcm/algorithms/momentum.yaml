algorithm:
  name: momentum
  description: "momentum congestion control algorithm"

# The derivative of the congestion window could be modeled as:
# dCWND/dt = (LOG_ALPHA * CWND) + (GAMMA_MIN + (GAMMA_MAX - GAMMA_MIN) * (1 - unsent_portion^GAMMA_POWER))) * (1 - ECN_rate) - BETA * ECN_rate

constants:
  - name: MTU
    type: uint
    value: "FABRIC_LINK_MTU"
    description: "Maximum segment size"
  
  - name: MINIMUM_CWND_BYTES
    type: uint
    value: !eval "MTU"
    description: "Minimum congestion window in bytes"
  
  - name: BRTT
    type: uint
    value: "FABRIC_BRTT"
    description: "Base round-trip time in picoseconds"

  - name: MAXIMUM_INFLIGHT_BYTES
    type: uint
    value: !eval "FABRIC_TRTT * FABRIC_LINK_RATE_GBPS / 1000"
    description: "Maximum in-flight bytes allowed"

  - name: MAXIMUM_CWND_BYTES
    type: uint
    value: !eval "min(FABRIC_MAX_CWND, MAXIMUM_INFLIGHT_BYTES)"
    description: "Maximum congestion window in bytes"
  
  - name: ALPHA
    type: float
    # value: 16.0
    value: 2.0
    description: "Base for exponential growth term of congestion window"
  
  - name: LOG_ALPHA
    type: float
    value: !eval "log(ALPHA)"
    description: "The logarithm of the ALPHA parameter"
  
  - name: GAMMA_MIN
    type: float
    # value: !eval "MTU * 1.0" # bytes
    value: !eval "MTU * 0.5" # bytes
    description: "Minimum gamma parameter"
  
  - name: GAMMA_MAX
    type: float
    # value: !eval "MTU * 10.0" # bytes
    value: !eval "MTU * 2.0" # bytes
    description: "Maximum gamma parameter"
  
  - name: LOG_GAMMA_POWER
    type: float
    value: 1.6
    description: "The logarithm of the gamma power parameter, the higher the value, the more room will be allocated for distinguishing flows at the beginning"
  
  - name: GAMMA_POWER
    type: float
    value: !eval "exp(LOG_GAMMA_POWER)"
    description: "Gamma power parameter"
  
  - name: BETA_MARGIN
    type: float
    value: 1.0
    description: "The margin multiplier for the beta parameter"
  
  - name: BETA
    type: float
    value: !eval "LOG_ALPHA * MAXIMUM_CWND_BYTES * BETA_MARGIN"
    description: "The beta parameter for congestion window decrease, computed to cancle out the exponential growth factor at full congestion"
  
  - name: ALGO_V2
    type: int
    value: 1
    description: "Whether to use the v2 version of the algorithm"
  
signals:
  - name: NUM_ACKED_BYTES
    type: PCM_SIG_DATA_TX
    accumulation: PCM_SIG_ACCUM_SUM
  - name: NUM_NACKED_BYTES
    type: PCM_SIG_DATA_NACKED
    accumulation: PCM_SIG_ACCUM_SUM
  - name: NUM_ECN
    type: PCM_SIG_ECN
    accumulation: PCM_SIG_ACCUM_SUM
  - name: NUM_ACK
    type: PCM_SIG_ACK
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_threshold: 1
  - name: NUM_NACK
    type: PCM_SIG_NACK
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_threshold: 1
  - name: TIME_STAMP
    type: PCM_SIG_ELAPSED_TIME
    accumulation: PCM_SIG_ACCUM_SUM
  - name: BYTES_TO_SEND
    type: PCM_SIG_TX_BACKLOG_BYTES
    accumulation: PCM_SIG_ACCUM_LAST
  - name: BYTES_SENT
    type: PCM_SIG_DATA_TX
    accumulation: PCM_SIG_ACCUM_SUM

controls:
  - name: CWND_BYTES
    type: PCM_CTRL_CWND
    initial_value: "MINIMUM_CWND_BYTES"
  
variables:
  - name: LAST_ACK_TRIGGERED_TIME
    initial_value: 0
    type: uint
    description: "The timestamp of the last triggered ACK event"
  - name: INIT
    initial_value: 0
    type: uint
    description: "Whether this is the first time the handler is invoked"