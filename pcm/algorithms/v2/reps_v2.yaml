algorithm:
  name: reps_v2
  description: "REPS LB algorithm (Optimized)"

constants:
  - name: EVS_SIZE
    type: uint
    value: 65536
  - name: EVC_SIZE
    type: uint
    value: 4

variables:
  - name: EVC_BITMAP
    arr_len: 1
    initial_value: 0
    type: uint
  - name: EVC
    arr_len: 4
    initial_value: 0
    type: uint
  - name: EVC_HEAD_IDX
    initial_value: 0
    type: uint
  - name: EVC_NUM_VALID_EVS
    initial_value: 0
    type: uint
  - name: EV_EXPLORE_COUNTER
    initial_value: 0
    type: uint
  - name: EV_SEED
    initial_value: 0
    type: uint
  - name: IS_INITIALIZED
    initial_value: 0
    type: uint
  - name: PREV_ECN
    initial_value: 0
    type: uint

signals:
  - name: NUM_ECN
    type: PCM_SIG_ECN
    accumulation: PCM_SIG_ACCUM_SUM
    reset_upon_trigger: "false"
  - name: ACK_EV
    type: PCM_SIG_ACK_EV
    accumulation: PCM_SIG_ACCUM_LAST
    reset_upon_trigger: "false"
  - name: NUM_ACK
    type: PCM_SIG_ACK
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_type: PCM_SIG_TRIGGER_DELTA
    trigger_op: ">="
    trigger_threshold: 1
    reset_upon_trigger: "false"
  - name: TX_BACKLOG_SIZE
    type: PCM_SIG_TX_READY_PKTS
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_type: PCM_SIG_TRIGGER_DELTA
    trigger_op: ">="
    trigger_threshold: 1
    reset_upon_trigger: "false"

controls:
  - name: NEXT_PKT_EV
    type: PCM_CTRL_EV
    initial_value: 0
