algorithm:
  name: dctcp_v2
  description: "DCTCP (Data Center TCP) congestion control algorithm (Optimized)"

constants:
  - name: MSS
    type: uint
    value: "FABRIC_LINK_MSS"
    description: "Maximum segment size"
  - name: GAMMA
    type: float
    value: 0.00390625
    description: "DCTCP alpha update parameter (1/256)"

signals:
  - name: ACK
    type: PCM_SIG_ACK
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_type: PCM_SIG_TRIGGER_DELTA
    trigger_op: ">="
    trigger_threshold: 1
    reset_upon_trigger: "false"
  - name: RTO
    type: PCM_SIG_RTO
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_type: PCM_SIG_TRIGGER_DELTA
    trigger_op: ">="
    trigger_threshold: 1
    reset_upon_trigger: "false"
  - name: NACK
    type: PCM_SIG_NACK
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_type: PCM_SIG_TRIGGER_DELTA
    trigger_op: ">="
    trigger_threshold: 1
    reset_upon_trigger: "false"
  - name: ECN
    type: PCM_SIG_ECN
    accumulation: PCM_SIG_ACCUM_SUM
    reset_upon_trigger: "false"

controls:
  - name: CWND
    type: PCM_CTRL_CWND
    initial_value: "FABRIC_LINK_MSS"

variables:
  - name: SSTHRESH
    initial_value: 4294967295
    type: uint
  - name: TOT_ACKED
    initial_value: 0
    type: uint
  - name: IN_FAST_RECOV
    initial_value: 0
    type: uint
  - name: EPOCH_DELIVERED
    initial_value: 0
    type: uint
  - name: EPOCH_ECN_DELIVERED
    initial_value: 0
    type: uint
  - name: EPOCH_TO_DELIVER
    initial_value: 1
    type: uint
  - name: ALPHA
    initial_value: 1.0
    type: float
  - name: PREV_ACK
    initial_value: 0
    type: uint
  - name: PREV_RTO
    initial_value: 0
    type: uint
  - name: PREV_NACK
    initial_value: 0
    type: uint
  - name: PREV_ECN
    initial_value: 0
    type: uint
