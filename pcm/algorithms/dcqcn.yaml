algorithm:
  name: dcqcn
  description: "DCQCN (Data Center Quantized Congestion Notification) algorithm"

constants:
  - name: BYTE_COUNTER
    type: uint
    value: 262144
    description: "Default byte counter threshold (2048 * 128)"
  - name: RATE_INCREASE_TIMER
    type: uint
    value: 5000000
    description: "Default rate increase timer (5000 * 1000 us)"
  - name: ALPHA_INIT
    type: float
    value: 1.0
    description: "Initial alpha value"
  - name: ALPHA_TIMER
    type: uint
    value: 10000000
    description: "Default alpha timer (10000 * 1000 us)"
  - name: BRTT
    type: uint
    value: "FABRIC_BRTT"
    description: "Base RTT"
  - name: RAI
    type: uint
    value: 1
    description: "Rate additive increase"
  - name: RHAI
    type: uint
    value: 10
    description: "Rate hyper additive increase"
  - name: FR_STEPS
    type: uint
    value: 5
    description: "Fast recovery steps"
  - name: GAMMA
    type: float
    value: 0.00390625
    description: "Alpha update parameter (1/256)"

signals:
  - name: ECN
    type: PCM_SIG_ECN
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_threshold: 1
  - name: ALPHA_TIMER
    type: PCM_SIG_ELAPSED_TIME
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_threshold: 10000000
  - name: RATE_INCREASE_TIMER
    type: PCM_SIG_ELAPSED_TIME
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_threshold: 5000000
  - name: TX_BURST
    type: PCM_SIG_DATA_TX
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_threshold: 262144

controls:
  - name: CWND
    type: PCM_CTRL_CWND
    initial_value: "FABRIC_MAX_CWND"

variables:
  - name: ALPHA
    initial_value: 1.0
    type: float
    description: "DCQCN alpha parameter"
  - name: CUR_RATE
    initial_value: "FABRIC_LINK_RATE_GBPS"
    type: float
    description: "Current sending rate in Gbps"
  - name: TGT_RATE
    initial_value: "FABRIC_LINK_RATE_GBPS"
    type: float
    description: "Target sending rate in Gbps"
  - name: RATE_INCREASE_EVTS
    initial_value: 0
    type: uint
    description: "Rate increase events counter"
  - name: BYTE_COUNTER_EVTS
    initial_value: 0
    type: uint
    description: "Byte counter events"
