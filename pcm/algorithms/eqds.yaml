algorithm:
  name: eqds
  description: "UEC EQDS variant of congestion control algorithm"
  location: PCM_FLOW_DST

constants:
  - name: MTU
    type: uint
    value: "FABRIC_LINK_MTU"
    description: "Path MTU"
  - name: K
    type: uint
    value: 4
    description: "Number of MTUs per credit grant"

signals:
  - name: CREDIT_TARGET
    type: PCM_SIG_CREDIT_TARGET
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_threshold: !eval "FABRIC_MAX_CWND + 1"
  - name: CREDIT_TIMER
    type: PCM_SIG_ELAPSED_TIME
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_threshold: !eval "FABRIC_LINK_RATE_GBPS * 1e9 / (CONST_MTU * CONST_K)"
    ownership: SHARED

controls:
  - name: CUMULATIVE_CREDIT
    type: PCM_CTRL_CUMULATIVE_CREDIT
    initial_value: "FABRIC_MAX_CWND"

variables:
  - name: ACKED_BYTES
    initial_value: 0
    type: uint
    description: "Total acknowledged bytes"