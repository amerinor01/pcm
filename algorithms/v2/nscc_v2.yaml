algorithm:
  name: nscc_v2
  description: "UE NSCC congestion control algorithm (Optimized)"

constants:
  - name: REFERENCE_RTT_PS
    type: uint
    value: 12000000
  - name: REFERENCE_LINKSPEED
    type: uint
    value: !eval "FABRIC_LINK_RATE_GBPS * 1000000000"
  - name: REFERENCE_BDP
    type: uint
    value: !eval "REFERENCE_RTT_PS / 1000000000000 * REFERENCE_LINKSPEED"
  - name: BDP
    type: uint
    value: "FABRIC_BDP"
  - name: F_BRTT
    type: uint
    value: "FABRIC_BRTT"
  - name: TRTT
    type: uint
    value: "FABRIC_TRTT"
  - name: MSS
    type: uint
    value: "FABRIC_LINK_MSS"
  - name: FULFILL_ADJ_BYTES_THRESH
    type: uint
    value: !eval "8 * FABRIC_LINK_MTU"
  - name: FULFILL_ADJ_TIME_THRESH
    type: uint
    value: "FABRIC_BRTT"
  - name: ETA
    type: float
    value: !eval "0.15 * MSS * SCALING_FACTOR_A"
  - name: TARGET_Q_DELAY
    type: uint
    value: !eval "TRTT - F_BRTT"
  - name: SCALING_FACTOR_A
    type: float
    value: !eval "BDP / REFERENCE_BDP"
  - name: SCALING_FACTOR_B
    type: float
    value: !eval "TARGET_Q_DELAY / REFERENCE_RTT_PS"
  - name: EWMA_DELAY_ALPHA
    type: float
    value: 0.0125
  - name: REACTION_DELAY
    type: float
    value: 1.0
  - name: FI
    type: float
    value: !eval "5 * MSS * SCALING_FACTOR_A"
  - name: PI_ALPHA
    type: float
    value: !eval "4.0 * MSS * SCALING_FACTOR_A * SCALING_FACTOR_B / TARGET_Q_DELAY"
  - name: MD_GAMMA
    type: float
    value: 0.8
  - name: FI_SCALE
    type: float
    value: !eval "0.25 * SCALING_FACTOR_A"
  - name: FI_QDELAY_TOL
    type: float
    value: 1000000
  - name: QA_GATE
    type: uint
    value: 3
  - name: QA_THRESHOLD
    type: float
    value: !eval "4 * TARGET_Q_DELAY"

signals:
  - name: RTT_SAMPLE
    type: PCM_SIG_RTT
    accumulation: PCM_SIG_ACCUM_LAST
    reset_upon_trigger: "false"
  - name: IN_FLIGHT_BYTES
    type: PCM_SIG_IN_FLIGHT
    accumulation: PCM_SIG_ACCUM_LAST
    reset_upon_trigger: "false"
  - name: NUM_ACKED_BYTES
    type: PCM_SIG_DATA_TX
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_type: PCM_SIG_TRIGGER_DELTA
    trigger_op: ">="
    trigger_threshold: 1
    reset_upon_trigger: "false"
  - name: NUM_ECN
    type: PCM_SIG_ECN
    accumulation: PCM_SIG_ACCUM_SUM
    reset_upon_trigger: "false"
  - name: NUM_NACKED_BYTES
    type: PCM_SIG_DATA_NACKED
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_type: PCM_SIG_TRIGGER_DELTA
    trigger_op: ">="
    trigger_threshold: 1
    reset_upon_trigger: "false"
  - name: ELAPSED_TIME
    type: PCM_SIG_ELAPSED_TIME
    accumulation: PCM_SIG_ACCUM_SUM

controls:
  - name: CWND_BYTES
    type: PCM_CTRL_CWND
    initial_value: "FABRIC_MAX_CWND"

variables:
  - name: QA_ACKED_BYTES
    initial_value: 0
    type: uint
  - name: QA_BYTES_IGNORED
    initial_value: 0
    type: uint
  - name: QA_BYTES_TO_IGNORE
    initial_value: 0
    type: uint
  - name: QA_TRIGGER
    initial_value: 0
    type: uint
  - name: QA_DEADLINE
    initial_value: 0
    type: uint
  - name: FAST_COUNT
    initial_value: 0
    type: uint
  - name: FAST_ACTIVE
    initial_value: 0
    type: uint
  - name: AVG_Q_DELAY
    initial_value: 0
    type: uint
  - name: T_MD_LAST
    initial_value: 0
    type: uint
  - name: BRTT
    initial_value: !eval "F_BRTT"
    type: uint
  - name: FULFILL_ADJ_INCREMENT
    initial_value: 0
    type: uint
  - name: LAST_FULFILL_ADJ_TIME
    initial_value: 0
    type: uint
  - name: FULFILL_ADJ_BYTES
    initial_value: 0
    type: uint
  - name: PREV_ACKED_BYTES
    initial_value: 0
    type: uint
  - name: PREV_ECN
    initial_value: 0
    type: uint
  - name: PREV_ACK
    initial_value: 0
    type: uint
  - name: PREV_NACK
    initial_value: 0
    type: uint
  - name: PREV_NACKED_BYTES
    initial_value: 0
    type: uint
