algorithm:
  name: ops_lb_v2
  description: "Obvious packet spraying LB algorithm (Optimized)"

constants:
  - name: NO_OF_PATHS
    type: uint
    value: 32
    description: "Number of paths"

variables:
  - name: IS_INITIALIZED
    initial_value: 0
    type: uint
  - name: PATH_RANDOM
    initial_value: 0
    type: uint
  - name: PATH_XOR
    initial_value: 0
    type: uint
  - name: CURRENT_EV_IDX
    initial_value: 0
    type: uint
  - name: PREV_BACKLOG
    initial_value: 0
    type: uint

signals:
  - name: TX_BACKLOG_SIZE
    type: PCM_SIG_TX_READY_PKTS
    accumulation: PCM_SIG_ACCUM_SUM
    trigger_type: PCM_SIG_TRIGGER_DELTA
    trigger_op: ">="
    trigger_threshold: 1
    reset_upon_trigger: "false"

controls:
  - name: NEXT_PKT_EV
    type: PCM_CTRL_EV
    initial_value: 0
